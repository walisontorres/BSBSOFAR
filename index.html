<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSB SÓ FAR | Site Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #fcfcfc; color: #1a1a1a; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .dark-card { background: #ffffff; border: 1px solid #efefef; transition: all 0.4s; box-shadow: 6px 6px 12px #e2e2e2, -6px -6px 12px #ffffff; }
        .dark-card:hover { transform: translateY(-10px); border-color: #8b5cf6; }
        .section-title { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; font-style: italic; margin-bottom: 3rem; text-align: center; }
        .nav-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .status-v { color: #10b981; font-weight: 900; } 
        .status-d { color: #ef4444; font-weight: 900; } 
        .modal { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.95); overflow-y: auto; padding: 20px; }
        
        /* Conquistas Estilizadas e Visíveis */
        .medal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .medal { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 15px; border-radius: 15px; color: #1a1d21; position: relative; font-weight: 800; border: 2px solid rgba(0,0,0,0.1); }
        .medal-rarity { position: absolute; top: 5px; right: 8px; font-size: 8px; text-transform: uppercase; color: #fff; padding: 2px 6px; border-radius: 6px; font-weight: 900; }
        
        .medal-common { background: #10b981; } .medal-common .medal-rarity { background: #065f46; }
        .medal-rare { background: #f97316; } .medal-rare .medal-rarity { background: #9a3412; }
        .medal-epic { background: #facc15; } .medal-epic .medal-rarity { background: #a16207; }
        .medal-legendary { background: #8b5cf6; } .medal-legendary .medal-rarity { background: #581c87; }
        
        .medal-icon { font-size: 24px; margin-bottom: 5px; display: block; }
        .medal-title { font-size: 11px; text-transform: uppercase; line-height: 1.2; }
        .medal-desc { font-size: 9px; font-weight: 500; opacity: 0.9; margin-top: 2px; }
        .rank-gold { color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.5); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 nav-blur border-b border-gray-100 py-4">
        <div class="container mx-auto flex justify-between items-center px-6 text-black font-black uppercase italic">
            <h1 class="text-2xl tracking-tighter">BSB SÓ FAR</h1>
            <div class="hidden md:flex space-x-6 text-[10px] tracking-[0.2em] text-gray-500">
                <a href="#jogos" class="hover:text-purple-600">Jogos</a>
                <a href="#elenco" class="hover:text-purple-600">Elenco</a>
                <a href="#stats" class="hover:text-purple-600">Ranking</a>
            </div>
        </div>
    </nav>

    <section id="jogos" class="py-20 bg-gray-50">
        <div class="container mx-auto px-6 max-w-5xl text-center font-black italic">
            <h3 class="section-title">Jogos Recentes</h3>
            
            <div class="max-w-4xl mx-auto bg-slate-900 rounded-[2.5rem] p-10 text-white shadow-2xl border border-slate-700 mb-12">
                <div class="flex flex-col md:flex-row justify-around items-center gap-10 mb-10 border-b border-slate-800 pb-10">
                    <div class="text-center">
                        <span class="text-gray-400 uppercase text-[10px] block mb-2 font-bold tracking-widest">Skill Rating</span>
                        <p class="text-6xl font-black text-yellow-500 italic">1635</p>
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-tighter">Best: Div 5</span>
                    </div>

                    <div class="flex gap-8 md:gap-12 font-black italic text-center">
                        <div><p class="text-4xl text-emerald-500">139W</p><span class="text-[9px] text-gray-500 uppercase">Wins</span></div>
                        <div><p class="text-4xl text-amber-500">33D</p><span class="text-[9px] text-gray-500 uppercase">Draws</span></div>
                        <div><p class="text-4xl text-rose-500">148L</p><span class="text-[9px] text-gray-500 uppercase">Losses</span></div>
                    </div>
                </div>
                <div class="flex justify-center gap-3">
                    <div class="w-10 h-10 bg-rose-600 rounded-lg flex items-center justify-center font-black">L</div>
                    <div class="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center font-black">W</div>
                    <div class="w-10 h-10 bg-rose-600 rounded-lg flex items-center justify-center font-black">L</div>
                    <div class="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center font-black">W</div>
                    <div class="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center font-black shadow-[0_0_15px_rgba(16,185,129,0.4)]">W</div>
                    <div class="ml-4 flex items-center text-emerald-500 font-black italic">6W • 0D • 2L</div>
                </div>
            </div>
        </div>
    </section>

    <section id="elenco" class="py-20 bg-white text-center font-black italic">
        <h3 class="section-title">O Elenco</h3>
        <div class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="dark-card p-6 rounded-3xl">
                <img src="walison.png" class="rounded-2xl mb-6 w-full aspect-[4/5] object-cover">
                <h4 class="text-2xl uppercase">Walison</h4>
                <button onclick="openStats('walison')" class="w-full mt-4 py-4 bg-purple-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg">Stats & Conquistas</button>
            </div>
            <div class="dark-card p-6 rounded-3xl">
                <img src="luigi.png" class="rounded-2xl mb-6 w-full aspect-[4/5] object-cover">
                <h4 class="text-2xl uppercase">Luigi</h4>
                <button onclick="openStats('luigi')" class="w-full mt-4 py-4 bg-purple-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg">Stats & Conquistas</button>
            </div>
            <div class="dark-card p-6 rounded-3xl">
                <img src="nicolas.png" class="rounded-2xl mb-6 w-full aspect-[4/5] object-cover">
                <h4 class="text-2xl uppercase">Nicolas</h4>
                <button onclick="openStats('nicolas')" class="w-full mt-4 py-4 bg-purple-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg">Stats & Conquistas</button>
            </div>
        </div>
    </section>

    <section id="stats" class="py-20 bg-gray-50 text-center font-black italic">
        <div class="container mx-auto px-6 max-w-4xl">
            <h3 class="section-title">Rank All Time</h3>
            <div id="rankList" class="space-y-4"></div>
            <div class="hidden">
                <table id="carreiraTable">
                    <tr data-player="walison"><td>Walison</td><td class="gols">224</td><td class="assists">373</td></tr>
                    <tr data-player="luigi"><td>Luigi</td><td class="gols">401</td><td class="assists">97</td></tr>
                    <tr data-player="nicolas"><td>Nicolas</td><td class="gols">110</td><td class="assists">114</td></tr>
                </table>
            </div>
        </div>
    </section>

    <div id="galleryModal" class="modal">
        <div class="max-w-2xl mx-auto mt-10 bg-gray-950 p-8 rounded-[3rem] border border-gray-800 shadow-2xl relative">
            <div class="flex justify-between items-center mb-8 text-white uppercase font-black italic">
                <h4 id="galleryTitle" class="text-2xl">Performance</h4>
                <button onclick="closeGallery()" class="bg-red-600 px-6 py-2 rounded-full text-[10px] font-bold">FECHAR X</button>
            </div>
            <div id="modalContent" class="space-y-8"></div>
        </div>
    </div>

    <script>
        const basePoints = { walison: 535, luigi: 435, nicolas: 290 };
        const statsGraphs = { walison: "walison_graph.png", nicolas: "nicolas_graph.png", luigi: "luigi_graph.png" };

        const medalData = {
            comum: { '⚽Primeiros Passos': '10 Gols', '🎯Atirador': '25 Gols', '🤝Equipe': '10 Assist.', '🎁Provedor': '25 Assist.' },
            raro: { '🔥Sequência': '50 Gols', '🥇Centurião': '100 Jogos', '📈Estável': 'Nota 7.5+' },
            epico: { '💯Centenário': '100 Gols', '🛡️Lenda': '250 Jogos', '🌟Elite': 'Nota 8.0+' },
            lendario: { '👑Máquina': '250 Gols', '🌍Mundial': 'Nota 8.5+' }
        };

        const playerMedals = {
            walison: ['Primeiros Passos', 'Atirador', 'Equipe', 'Provedor', 'Sequência', 'Centurião', 'Estável', 'Centenário', 'Lenda', 'Elite', 'Mundial'],
            luigi: ['Primeiros Passos', 'Atirador', 'Sequência', 'Centurião', 'Estável', 'Centenário', 'Elite', 'Máquina'],
            nicolas: ['Primeiros Passos', 'Equipe', 'Provedor', 'Centurião', 'Estável', 'Mundial']
        };

        function updateRank() {
            const players = [];
            document.querySelectorAll('#carreiraTable tr').forEach(row => {
                const id = row.getAttribute('data-player');
                const nome = row.cells[0].innerText;
                const gols = parseInt(row.querySelector('.gols').innerText);
                const assists = parseInt(row.querySelector('.assists').innerText);
                const score = basePoints[id] + (gols * 10) + (assists * 5);
                players.push({ nome, score });
            });
            players.sort((a, b) => b.score - a.score);
            document.getElementById('rankList').innerHTML = players.map((p, i) => `
                <div class="flex justify-between items-center p-8 bg-slate-900 text-white rounded-3xl border border-slate-700">
                    <div class="flex items-center gap-6"><span class="text-3xl ${i === 0 ? 'rank-gold' : 'text-gray-600'}">#${i + 1}</span><span class="text-xl uppercase">${p.nome}</span></div>
                    <span class="text-3xl text-purple-500">${p.score.toLocaleString()} PTS</span>
                </div>
            `).join('');
        }

        function openStats(p) {
            const m = document.getElementById('galleryModal'); 
            const c = document.getElementById('modalContent'); 
            document.getElementById('galleryTitle').innerText = "Performance: " + p;
            
            let html = `
                <div class="graph-container text-white italic">
                    <img src="${statsGraphs[p]}" class="w-full rounded-2xl border border-gray-700 mb-8 shadow-2xl">
                    <div class="bg-gray-900 p-8 rounded-[2rem] border border-gray-800">
                        <h5 class="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-6">Quadro de Conquistas</h5>
                        <div class="medal-grid">`;

            for (const [rarity, medals] of Object.entries(medalData)) {
                for (const [title, desc] of Object.entries(medals)) {
                    const cleanTitle = title.replace(/[⚽🎯🤝🎁🔥🥇📈💯🛡️🌟👑🌍]/u, '');
                    if (playerMedals[p].includes(cleanTitle)) {
                        html += `
                            <div class="medal medal-${rarity}">
                                <span class="medal-rarity">${rarity}</span>
                                <span class="medal-icon">${title.charAt(0)}</span>
                                <span class="medal-title">${title.slice(1)}</span>
                                <span class="medal-desc">${desc}</span>
                            </div>`;
                    }
                }
            }
            html += `</div></div></div>`;
            c.innerHTML = html;
            m.style.display = 'block'; document.body.style.overflow = 'hidden';
        }

        window.onload = updateRank;
        function closeGallery() { document.getElementById('galleryModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    </script>
</body>
</html>
